# App-owned tables live in the app schema; public remains available for
# extensions such as pgvector.
x-app-database-url: &app_database_url postgres://cyber:cyber@postgres:5432/vendor_threat_watch?options=-c%20search_path%3Dapp%2Cpublic

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: vendor_threat_watch_postgres
    environment:
      POSTGRES_USER: cyber
      POSTGRES_PASSWORD: cyber
      POSTGRES_DB: vendor_threat_watch
    ports:
      - "5432:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyber -d vendor_threat_watch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: only needed for BullMQ worker mode (not the phase-1 batch scheduler).
  redis:
    image: redis:8
    container_name: vendor_threat_watch_redis
    profiles: ["queue"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Runs migrations, then exits 0. App services wait for it to complete so code
  # never serves against a half-migrated schema. Fails closed on migration error.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: vendor-threat-watch
    command: ["npm", "run", "db:migrate"]
    environment:
      DATABASE_URL: *app_database_url
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Internal scheduler (chosen pattern). Runs the full pipeline every
  # RSS_FETCH_INTERVAL_MINUTES. Swap `command` to ["npm","run","pipeline:run"]
  # and drive from host cron for the external-scheduler pattern instead.
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: vendor-threat-watch
    command: ["npm", "run", "scheduler"]
    env_file: .env
    environment:
      DATABASE_URL: *app_database_url
      RSS_FETCH_INTERVAL_MINUTES: ${RSS_FETCH_INTERVAL_MINUTES:-20}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    stop_grace_period: 60s # give an in-flight run time to finish on SIGTERM

  # Phase-1 hosted web: public Events/Articles + analyst /workspace (ADR-0003).
  # Bound to localhost by default; put Cloudflare Tunnel or a host reverse proxy
  # in front for TLS/domain (see docs/engineering-notes/phase1-vps-cloudflare.md).
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: vendor-threat-watch-web
    env_file: .env
    environment:
      DATABASE_URL: *app_database_url
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET}
      ANALYST_GITHUB_USERS: ${ANALYST_GITHUB_USERS}
      # Public origin for Auth.js callbacks when behind Cloudflare (recommended).
      AUTH_URL: ${AUTH_URL:-}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Legacy local UIs (not part of the phase-1 prod profile). Enable with:
  #   docker compose --profile legacy up -d
  portal:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: Dockerfile
    image: vendor-threat-watch
    command: ["npm", "run", "portal"]
    env_file: .env
    environment:
      DATABASE_URL: *app_database_url
      PORTAL_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:4322:4322"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  dashboard:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: Dockerfile
    image: vendor-threat-watch
    command: ["npm", "run", "review:dashboard"]
    env_file: .env
    environment:
      DATABASE_URL: *app_database_url
    ports:
      - "127.0.0.1:4321:4321"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres18_data:
  redis_data:
