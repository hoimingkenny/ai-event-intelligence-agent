name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-test:
    name: check + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Leave MINIMAX_API_KEY / DATABASE_URL unset so live LLM and DB
      # integration suites stay skipped (describe.skipIf).
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Type-check root
        run: npm run check

      - name: Type-check web
        run: npx tsc --noEmit
        working-directory: web

      - name: Unit tests
        run: npm test
